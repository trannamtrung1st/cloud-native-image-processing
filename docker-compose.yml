# Full stack: infrastructure + API + workers + frontend.
#   docker compose up
#
# Backend only (no UI container): docker compose -f docker-compose.backend.yml up
include:
  - path: docker-compose.backend.yml

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: cnip-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - cnip-infra
